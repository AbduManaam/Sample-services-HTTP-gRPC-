version: '3.9'

services:
  user-service-1:
    build:
      context: .
      dockerfile: deploy/user.Dockerfile
    environment:
      - INSTANCE_ID=user-1
      - PORT=9001
    ports:
      - "9011:9001"  # host port 9011 → container port 9001
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  user-service-2:
    build:
      context: .
      dockerfile: deploy/user.Dockerfile
    environment:
      - INSTANCE_ID=user-2
      - PORT=9001
    ports:
      - "9012:9001"
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  user-service-3:
    build:
      context: .
      dockerfile: deploy/user.Dockerfile
    environment:
      - INSTANCE_ID=user-3
      - PORT=9001
    ports:
      - "9013:9001"
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Order Service — 3 instances ──────────────────────────────────────
  order-service-1:
    build:
      context: .
      dockerfile: deploy/order.Dockerfile
    environment:
      - INSTANCE_ID=order-1
      - PORT=9002
    ports:
      - "9021:9002"
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  order-service-2:
    build:
      context: .
      dockerfile: deploy/order.Dockerfile
    environment:
      - INSTANCE_ID=order-2
      - PORT=9002
    ports:
      - "9022:9002"
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  order-service-3:
    build:
      context: .
      dockerfile: deploy/order.Dockerfile
    environment:
      - INSTANCE_ID=order-3
      - PORT=9002
    ports:
      - "9023:9002"
    networks:
      - elitegate_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── gRPC Service — single instance (not LB tested here) ───────────────
  grpc-service:
    build:
      context: .
      dockerfile: deploy/grpc.Dockerfile
    container_name: grpc-service
    ports:
      - "50052:50052"
    networks:
      - elitegate_net
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

networks:
  elitegate_net:
    external: true  # EliteGate's compose already created this network
    name: elitegate_net