version: '3.9'

services:
  user-service:
    build:
      context: .
      dockerfile: deploy/user.Dockerfile
    container_name: user-service
    ports:
      - "9001:9001"
    networks:
      - elitegate_net
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  order-service:
    build:
      context: .
      dockerfile: deploy/order.Dockerfile
    container_name: order-service
    ports:
      - "9002:9002"
    networks:
      - elitegate_net
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  grpc-service:
    build:
      context: .
      dockerfile: deploy/grpc.Dockerfile
    container_name: grpc-service
    ports:
      - "50052:50052"
    networks:
      - elitegate_net
    environment:
      - LOG_LEVEL=info

networks:
  elitegate_net:
    name: elitegate_net 
    driver: bridge
